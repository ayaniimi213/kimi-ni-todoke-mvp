<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>君に届け - 最適受取スポット提案</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- サンプルデータ: 受取候補地点 ---
        const CANDIDATES = [
            { id: 1, name: "渋谷駅ハチ公口ロッカー", type: "駅ロッカー", lat: 35.6595, lng: 139.7005, open: "00:00", close: "23:59" },
            { id: 2, name: "ファミリーマート 道玄坂店", type: "コンビニ", lat: 35.6590, lng: 139.6975, open: "00:00", close: "23:59" },
            { id: 3, name: "セブンイレブン 渋谷3丁目店", type: "コンビニ", lat: 35.6575, lng: 139.7040, open: "00:00", close: "23:59" },
            { id: 4, name: "ローソン 桜丘店", type: "コンビニ", lat: 35.6555, lng: 139.7020, open: "00:00", close: "23:59" },
            { id: 5, name: "青山学院大学 正門付近", type: "大学付近", lat: 35.6605, lng: 139.7095, open: "08:00", close: "20:00" },
            { id: 6, name: "渋谷スクランブルスクエア 1F", type: "商業施設", lat: 35.6585, lng: 139.7025, open: "10:00", close: "21:00" },
            { id: 7, name: "ヒカリエ 2F 受取カウンター", type: "商業施設", lat: 35.6592, lng: 139.7038, open: "10:00", close: "21:00" },
            { id: 8, name: "代々木公園 噴水広場前", type: "公園", lat: 35.6715, lng: 139.6950, open: "00:00", close: "23:59" },
            { id: 9, name: "表参道駅 B3出口ロッカー", type: "駅ロッカー", lat: 35.6652, lng: 139.7125, open: "05:00", close: "23:30" },
            { id: 10, name: "ミニストップ 神南店", type: "コンビニ", lat: 35.6630, lng: 139.7000, open: "00:00", close: "23:59" },
        ];

        // --- プリセット地点（入力補助用） ---
        const PRESET_LOCATIONS = [
            { name: "渋谷駅", lat: 35.6580, lng: 139.7016 },
            { name: "恵比寿駅", lat: 35.6466, lng: 139.7100 },
            { name: "原宿駅", lat: 35.6701, lng: 139.7026 },
            { name: "表参道駅", lat: 35.6652, lng: 139.7125 },
        ];

        // --- ヘルパー関数: 距離計算 (Haversine) ---
        const getDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // in metres
        };

        const formatDist = (m) => m > 1000 ? `${(m/1000).toFixed(1)}km` : `${Math.round(m)}m`;

        // --- メインコンポーネント ---
        function App() {
            const [step, setStep] = useState('input'); // 'input', 'result', 'complete'
            const [currentPos, setCurrentPos] = useState({ lat: 35.6580, lng: 139.7016, name: '現在地（未設定）' });
            const [nextPos, setNextPos] = useState(PRESET_LOCATIONS[3]); // 初期値: 表参道
            const [nextTime, setNextTime] = useState("18:00");
            const [pickupTimeRange, setPickupTimeRange] = useState("17:00");
            const [recommendations, setRecommendations] = useState([]);
            const [selectedSpot, setSelectedSpot] = useState(null);

            // 位置情報取得
            const handleGetLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setCurrentPos({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            name: '現在地（GPS取得）'
                        });
                    }, () => alert("位置情報が取得できませんでした。"));
                }
            };

            // スコア計算ロジック
            const calculateRecommendations = () => {
                const results = CANDIDATES.map(spot => {
                    const distFromCurrent = getDistance(currentPos.lat, currentPos.lng, spot.lat, spot.lng);
                    const distToNext = getDistance(spot.lat, spot.lng, nextPos.lat, nextPos.lng);
                    const directDist = getDistance(currentPos.lat, currentPos.lng, nextPos.lat, nextPos.lng);
                    
                    // 遠回り度 (1 = 直線上, 1.5 = 50%遠回り)
                    const detourFactor = (distFromCurrent + distToNext) / directDist;
                    
                    // スコア計算（単純化: 距離が近く、遠回りが少ないほど高得点）
                    // 10000点満点からの減点方式
                    let score = 10000 - (distFromCurrent + distToNext);
                    if (detourFactor < 1.1) score += 2000; // ほぼ道なりボーナス
                    if (distToNext < 300) score += 1500;   // 目的地にめちゃ近いボーナス

                    // 理由の生成
                    let reason = "";
                    if (detourFactor < 1.1) reason = "移動ルートの途中にあり、最も効率的です。";
                    else if (distToNext < 300) reason = "次の予定地のすぐ近くなので、到着直前に受け取れます。";
                    else if (distFromCurrent < 300) reason = "今いる場所からすぐ近くのスポットです。";
                    else reason = "予定の時間に合わせやすく、無理のないルートです。";

                    return { ...spot, score, distFromCurrent, distToNext, reason };
                });

                const top3 = results.sort((a, b) => b.score - a.score).slice(0, 3);
                setRecommendations(top3);
                setStep('result');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-lg overflow-hidden flex flex-col">
                    {/* Header */}
                    <header className="bg-indigo-600 text-white p-6 text-center">
                        <h1 className="text-2xl font-bold italic">君に届け</h1>
                        <p className="text-xs opacity-80 mt-1">〜最適な受取場所を提案〜</p>
                    </header>

                    <main className="flex-grow p-6">
                        {step === 'input' && (
                            <div className="space-y-6">
                                <section>
                                    <label className="block text-sm font-semibold mb-2">① 現在地</label>
                                    <div className="flex gap-2 mb-2">
                                        <button onClick={handleGetLocation} className="bg-indigo-50 text-indigo-600 px-3 py-2 rounded-lg text-sm font-medium border border-indigo-200 flex items-center gap-1">
                                            <span>📍</span> GPSで取得
                                        </button>
                                        <select 
                                            className="flex-grow border rounded-lg px-3 py-2 text-sm bg-gray-50"
                                            onChange={(e) => {
                                                const p = PRESET_LOCATIONS.find(l => l.name === e.target.value);
                                                if(p) setCurrentPos({...p, name: p.name});
                                            }}
                                        >
                                            <option>選択肢から選ぶ</option>
                                            {PRESET_LOCATIONS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="text-xs text-gray-500 ml-1">現在設定: {currentPos.name}</div>
                                </section>

                                <section>
                                    <label className="block text-sm font-semibold mb-2">② 次の予定地</label>
                                    <select 
                                        className="w-full border rounded-lg px-3 py-2 bg-gray-50"
                                        value={nextPos.name}
                                        onChange={(e) => setNextPos(PRESET_LOCATIONS.find(l => l.name === e.target.value))}
                                    >
                                        {PRESET_LOCATIONS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
                                    </select>
                                </section>

                                <div className="grid grid-cols-2 gap-4">
                                    <section>
                                        <label className="block text-sm font-semibold mb-2">③ 予定時刻</label>
                                        <input type="time" value={nextTime} onChange={e => setNextTime(e.target.value)} className="w-full border rounded-lg px-3 py-2 bg-gray-50" />
                                    </section>
                                    <section>
                                        <label className="block text-sm font-semibold mb-2">④ 受取希望</label>
                                        <input type="time" value={pickupTimeRange} onChange={e => setPickupTimeRange(e.target.value)} className="w-full border rounded-lg px-3 py-2 bg-gray-50" />
                                    </section>
                                </div>

                                <button 
                                    onClick={calculateRecommendations}
                                    className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-blue-200 shadow-lg hover:bg-indigo-700 transition"
                                >
                                    最適な場所を探す
                                </button>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold">おすすめの受取場所</h2>
                                    <button onClick={() => setStep('input')} className="text-sm text-indigo-600 underline">条件を変える</button>
                                </div>
                                
                                {recommendations.map((spot, index) => (
                                    <div key={spot.id} className={`border-2 rounded-2xl p-4 transition ${index === 0 ? 'border-indigo-500 bg-indigo-50' : 'border-gray-100'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${index === 0 ? 'bg-indigo-500 text-white' : 'bg-gray-200'}`}>
                                                {index === 0 ? 'BEST' : `${index + 1}位`}
                                            </span>
                                            <span className="text-xs text-gray-500">{spot.type}</span>
                                        </div>
                                        <h3 className="font-bold text-lg">{spot.name}</h3>
                                        <div className="mt-2 space-y-1 text-sm text-gray-600">
                                            <p className="flex justify-between"><span>現在地から:</span> <span>{formatDist(spot.distFromCurrent)} (徒歩{Math.round(spot.distFromCurrent/80)}分)</span></p>
                                            <p className="flex justify-between"><span>予定地まで:</span> <span>{formatDist(spot.distToNext)} (徒歩{Math.round(spot.distToNext/80)}分)</span></p>
                                            <p className="flex justify-between"><span>利用可能時間:</span> <span>{spot.open}〜{spot.close}</span></p>
                                        </div>
                                        <div className="mt-3 p-3 bg-white rounded-lg border border-indigo-100 text-sm text-indigo-800 font-medium leading-relaxed">
                                            ✨ {spot.reason}
                                        </div>
                                        <button 
                                            onClick={() => { setSelectedSpot(spot); setStep('complete'); }}
                                            className="w-full mt-4 bg-white border-2 border-indigo-600 text-indigo-600 py-2 rounded-xl font-bold hover:bg-indigo-600 hover:text-white transition"
                                        >
                                            この場所で受け取る
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 'complete' && (
                            <div className="text-center py-10 space-y-6">
                                <div className="text-6xl">📦</div>
                                <h2 className="text-2xl font-bold">受取場所を決定しました！</h2>
                                <div className="bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-gray-200">
                                    <p className="text-sm text-gray-500 mb-1">決定したスポット</p>
                                    <p className="text-xl font-bold text-indigo-600">{selectedSpot.name}</p>
                                    <p className="text-sm text-gray-500 mt-4">配送員がこの場所へ向かいます。<br/>到着の5分前に通知します。</p>
                                </div>
                                <button 
                                    onClick={() => setStep('input')}
                                    className="w-full bg-gray-800 text-white py-4 rounded-xl font-bold"
                                >
                                    トップに戻る
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="p-4 text-center text-xs text-gray-400 border-t">
                        &copy; 2024 君に届け Project MVP
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
