<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>君に届け - 最適受取スポット提案</title>
    <!-- Tailwind CSS (デザイン用) のみ読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg overflow-hidden flex flex-col">
        <!-- Header -->
        <header class="bg-indigo-600 text-white p-6 text-center">
            <h1 class="text-2xl font-bold italic">君に届け</h1>
            <p class="text-xs opacity-80 mt-1">〜最適な受取場所を提案〜</p>
        </header>

        <main id="app-content" class="flex-grow p-6">
            <!-- ここにJavaScriptで画面が注入されます -->
        </main>

        <footer class="p-4 text-center text-xs text-gray-400 border-t">
            &copy; 2026 君に届け Project MVP
        </footer>
    </div>

    <script>
        // --- 1. データ定義 ---
        const CANDIDATES = [
            { id: 1, name: "渋谷駅ハチ公口ロッカー", type: "駅ロッカー", lat: 35.6595, lng: 139.7005, open: "00:00", close: "23:59" },
            { id: 2, name: "ファミリーマート 道玄坂店", type: "コンビニ", lat: 35.6590, lng: 139.6975, open: "00:00", close: "23:59" },
            { id: 3, name: "セブンイレブン 渋谷3丁目店", type: "コンビニ", lat: 35.6575, lng: 139.7040, open: "00:00", close: "23:59" },
            { id: 4, name: "ローソン 桜丘店", type: "コンビニ", lat: 35.6555, lng: 139.7020, open: "00:00", close: "23:59" },
            { id: 5, name: "青山学院大学 正門付近", type: "大学付近", lat: 35.6605, lng: 139.7095, open: "08:00", close: "20:00" },
            { id: 6, name: "渋谷スクランブルスクエア 1F", type: "商業施設", lat: 35.6585, lng: 139.7025, open: "10:00", close: "21:00" },
            { id: 7, name: "ヒカリエ 2F 受取カウンター", type: "商業施設", lat: 35.6592, lng: 139.7038, open: "10:00", close: "21:00" },
            { id: 10, name: "ミニストップ 神南店", type: "コンビニ", lat: 35.6630, lng: 139.7000, open: "00:00", close: "23:59" },
        ];

        const PRESETS = [
            { name: "渋谷駅", lat: 35.6580, lng: 139.7016 },
            { name: "恵比寿駅", lat: 35.6466, lng: 139.7100 },
            { name: "原宿駅", lat: 35.6701, lng: 139.7026 },
            { name: "表参道駅", lat: 35.6652, lng: 139.7125 },
        ];

        // --- 2. 状態管理 ---
        let state = {
            currentPos: PRESETS[0],
            nextPos: PRESETS[3],
            results: []
        };

        // --- 3. ロジック ---
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function calculate() {
            const res = CANDIDATES.map(spot => {
                const d1 = getDistance(state.currentPos.lat, state.currentPos.lng, spot.lat, spot.lng);
                const d2 = getDistance(spot.lat, spot.lng, state.nextPos.lat, state.nextPos.lng);
                const direct = getDistance(state.currentPos.lat, state.currentPos.lng, state.nextPos.lat, state.nextPos.lng);
                const detour = (d1 + d2) / direct;
                
                let score = 10000 - (d1 + d2);
                let reason = "予定の時間に合わせやすく、無理のないルートです。";
                if (detour < 1.1) { score += 2000; reason = "移動ルートの途中にあり、最も効率的です。"; }
                else if (d2 < 300) { score += 1500; reason = "次の予定地のすぐ近くなので、到着直前に受け取れます。"; }

                return { ...spot, score, d1, d2, reason };
            });
            state.results = res.sort((a, b) => b.score - a.score).slice(0, 3);
            renderResult();
        }

        // --- 4. 画面描画 ---
        const container = document.getElementById('app-content');

        function renderInput() {
            container.innerHTML = `
                <div class="space-y-6">
                    <section>
                        <label class="block text-sm font-semibold mb-2">① 現在地</label>
                        <select id="currentSelect" class="w-full border rounded-lg px-3 py-2 bg-gray-50">
                            ${PRESETS.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                        </select>
                    </section>
                    <section>
                        <label class="block text-sm font-semibold mb-2">② 次の予定地</label>
                        <select id="nextSelect" class="w-full border rounded-lg px-3 py-2 bg-gray-50">
                            ${PRESETS.map((p,i) => `<option value="${p.name}" ${i===3?'selected':''}>${p.name}</option>`).join('')}
                        </select>
                    </section>
                    <button onclick="handleCalculate()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition">
                        最適な場所を探す
                    </button>
                </div>
            `;
        }

        function renderResult() {
            container.innerHTML = `
                <div class="space-y-4">
                    <h2 class="text-xl font-bold mb-4">おすすめの受取場所</h2>
                    ${state.results.map((spot, i) => `
                        <div class="border-2 rounded-2xl p-4 ${i === 0 ? 'border-indigo-500 bg-indigo-50' : 'border-gray-100'}">
                            <span class="inline-block px-2 py-1 rounded text-xs font-bold ${i === 0 ? 'bg-indigo-500 text-white' : 'bg-gray-200'} mb-2">
                                ${i === 0 ? 'BEST' : (i + 1) + '位'}
                            </span>
                            <h3 class="font-bold text-lg">${spot.name}</h3>
                            <p class="text-xs text-gray-500 mb-2">${spot.type} | 徒歩 約${Math.round(spot.d1/80)}分</p>
                            <div class="mt-3 p-3 bg-white rounded-lg border border-indigo-100 text-sm text-indigo-800 font-medium">
                                ✨ ${spot.reason}
                            </div>
                            <button onclick="renderComplete('${spot.name}')" class="w-full mt-4 bg-white border-2 border-indigo-600 text-indigo-600 py-2 rounded-xl font-bold">
                                この場所で受け取る
                            </button>
                        </div>
                    `).join('')}
                    <button onclick="renderInput()" class="w-full text-gray-500 text-sm py-2">条件をやり直す</button>
                </div>
            `;
        }

        function renderComplete(name) {
            container.innerHTML = `
                <div class="text-center py-10 space-y-6">
                    <div class="text-6xl">📦</div>
                    <h2 class="text-2xl font-bold">受取場所を決定しました！</h2>
                    <div class="bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-gray-200">
                        <p class="text-xl font-bold text-indigo-600">${name}</p>
                    </div>
                    <button onclick="renderInput()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold">トップに戻る</button>
                </div>
            `;
        }

        // --- 5. イベントハンドラ ---
        window.handleCalculate = () => {
            const curVal = document.getElementById('currentSelect').value;
            const nextVal = document.getElementById('nextSelect').value;
            state.currentPos = PRESETS.find(p => p.name === curVal);
            state.nextPos = PRESETS.find(p => p.name === nextVal);
            calculate();
        };

        // 初期表示
        renderInput();
    </script>
</body>
</html>
